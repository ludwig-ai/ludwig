adapter:
  _oneOf:
    allOf:
      ui_display_name: Perform parameter efficient fine-tuning
      expected_impact: 3
    none:
      ui_display_name: Disabled
      expected_impact: 3
  _meta:
    expected_impact: 3
    ui_component_type: radio_string_combined
  lora:
    type:
      long_description: |
        LoRA is a simple, yet effective, method for parameter-efficient fine-tuning of pretrained language models.
        It works by adding a small number of trainable parameters to the model, which are used to adapt the
        pretrained parameters to the downstream task. This allows the model to be fine-tuned with a much smaller
        number of training examples, and can even be used to fine-tune models on tasks that have no training data
        available at all.
    r:
      ui_display_name: R
      expected_impact: 3
    alpha:
      ui_display_name: Alpha
      expected_impact: 1
    dropout:
      ui_display_name: Dropout
      expected_impact: 2
    target_modules:
      ui_display_name: Target Modules
      expected_impact: 2
    use_rslora:
      ui_display_name: Enable RSLora
      expected_impact: 2
    use_dora:
      ui_display_name: Enable DoRa
      expected_impact: 2
    init_lora_weights:
      ui_display_name: LoRA Initializer
      expected_impact: 3
    rank_pattern:
      ui_display_name: Per-Layer Rank Pattern
      expected_impact: 2
    alpha_pattern:
      ui_display_name: Per-Layer Alpha Pattern
      expected_impact: 2
    layer_replication:
      ui_display_name: Layer Replication
      expected_impact: 2
  tinylora:
    type:
      long_description: |
        TinyLoRA is an extremely parameter-efficient fine-tuning method that uses SVD decomposition of frozen weights
        and projects a tiny trainable vector through fixed random tensors. It can achieve fine-tuning with as few as
        13 trainable parameters, making it ideal for extremely resource-constrained environments or edge deployment.
        Paper: https://arxiv.org/abs/2602.04118
  c3a:
    type:
      long_description: |
        C3A (Contextual/Conditional/Compositional Adapter) uses block-diagonal structured matrices for parameter
        efficiency. It enables context-aware adapter routing and multi-task modularity, making it well-suited for
        multi-domain generalization and compositional fine-tuning workflows.
  oft:
    type:
      long_description: |
        OFT (Orthogonal Fine-Tuning) applies orthogonal transformations to weight matrices, preserving the
        hyperspherical energy of the pre-trained model. This prevents catastrophic forgetting and maintains output
        diversity while adapting to new tasks. Paper: https://arxiv.org/abs/2306.07280
  hra:
    type:
      long_description: |
        HRA (Householder Reflection Adaptation) parameterizes weight updates as products of Householder reflections,
        which are orthogonal by construction. It provides stronger expressivity than OFT with fewer hyperparameters.
        Paper: https://arxiv.org/abs/2405.17484
  waveft:
    type:
      long_description: |
        WaveFT (Wavelet-domain Fine-Tuning) learns weight updates in the wavelet frequency domain. It provides a
        different inductive bias from spatial methods like LoRA, often benefiting tasks with structured or periodic
        patterns. Paper: https://arxiv.org/abs/2411.09295
  ln_tuning:
    type:
      long_description: |
        LN-Tuning fine-tunes only the layer normalization parameters (weight and bias) of the model. It is
        extremely parameter-efficient (often <0.1% of total parameters) while being surprisingly effective for
        domain adaptation tasks.
  vblora:
    type:
      long_description: |
        VBLoRA (Vector Bank LoRA) represents LoRA weight matrices as a sparse combination of shared vectors from a
        global bank. By reusing vectors across layers, it achieves significant parameter compression beyond standard
        LoRA. Paper: https://arxiv.org/abs/2405.15179
  adalora:
    type:
      long_description: |
        AdaLoRA is an extension of LoRA that allows the model to adapt the pretrained parameters to the downstream
        task in a task-specific manner. This is done by adding a small number of trainable parameters to the model,
        which are used to adapt the pretrained parameters to the downstream task. This allows the model to be
        fine-tuned with a much smaller number of training examples, and can even be used to fine-tune models on tasks
        that have no training data available at all.
  prompt_learning:
    num_virtual_tokens:
      ui_display_name: Num Virtual Tokens
      expected_impact: 3
  prompt_tuning:
    prompt_tuning_init:
      ui_display_name: Prompt Tuning Init
      expected_impact: 2
    prompt_tuning_init_text:
      ui_display_name: Prompt Tuning Init Text
      expected_impact: 2
  adaption_prompt:
    type:
      long_description: |
        Adaption Prompt is taken from the paper
        [LLaMA-Adapter: Efficient Fine-tuning of Language Models with Zero-init Attention](https://arxiv.org/pdf/2303.16199.pdf).
        It adds a set of learnable adaption prompts and prepends them to the word tokens at higher transformer layers.
        Then, a zero-initialized attention mechanism with zero gating is introduced, which adaptively injects
        new instructional cues into LLaMA, while effectively preserving its pre-trained knowledge. According to
        the paper, LLaMA-Adapter can generate high-quality responses, comparable to Alpaca with fully fine-tuned
        7B parameters.
    adapter_len:
      ui_display_name: Adapter Length
      expected_impact: 3
    adapter_layers:
      ui_display_name: Adapter Layers
      expected_impact: 3
  ia3:
    type:
      long_description: |
        [Infused Adapter by Inhibiting and Amplifying Inner Activations](https://arxiv.org/pdf/2205.05638.pdf), or IA3,
        is a method that adds three learned vectors `l_k``, `l_v``, and `l_ff`, to rescale the keys and values of the self-attention and encoder-decoder attention layers, and the intermediate activation of the position-wise feed-forward network respectively. These learned vectors are the only trainable parameters during fine-tuning, and thus the original weights remain frozen. Dealing with learned vectors (as opposed to learned low-rank updates to a weight matrix like LoRA) keeps the number of trainable parameters much smaller.
    target_modules:
      ui_display_name: Target Modules
      expected_impact: 3
    feedforward_modules:
      ui_display_name: Feedforward Modules
      expected_impact: 3
    fan_in_fan_out:
      ui_display_name: Fan In Fan Out
      expected_impact: 3
    modules_to_save:
      ui_display_name: Modules to Save
      expected_impact: 3
    init_ia3_weights:
      ui_display_name: Init IA3 Weights
      expected_impact: 3
