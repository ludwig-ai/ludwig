version: 1.0
name: hc3
huggingface_dataset_id: Hello-SimpleAI/HC3
huggingface_revision: refs/convert/parquet
huggingface_data_files:
  train: all/train/0000.parquet
loader: misc_loaders.HC3Loader
description: |
  Human ChatGPT Comparison Corpus (HC3): binary classification of whether an
  answer is human-written (0) or generated by ChatGPT (1). Each source row is
  expanded into two rows using the first answer from each list.
columns:
  - name: question
    type: text
  - name: answer
    type: text
  - name: is_chatgpt
    type: binary
output_features:
  - name: is_chatgpt
    type: binary
