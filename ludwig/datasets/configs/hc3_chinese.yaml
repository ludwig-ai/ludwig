version: 1.0
name: hc3_chinese
huggingface_dataset_id: Hello-SimpleAI/HC3-Chinese
huggingface_revision: refs/convert/parquet
huggingface_data_files:
  train: all/train/0000.parquet
loader: misc_loaders.HC3Loader
description: |
  HC3-Chinese: Chinese Human ChatGPT Comparison Corpus. Binary classification
  of whether an answer is human-written (0) or generated by ChatGPT (1).
columns:
  - name: question
    type: text
  - name: answer
    type: text
  - name: is_chatgpt
    type: binary
output_features:
  - name: is_chatgpt
    type: binary
