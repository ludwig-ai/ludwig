version: 1.0
name: poem_sentiment
huggingface_dataset_id: google-research-datasets/poem_sentiment
loader: hugging_face.HFLoader
description: |
  Poem Sentiment: verse-level sentiment classification from English poetry.
  Labels: negative, positive, no impact, mixed.
columns:
  - name: verse_text
    type: text
  - name: label
    type: category
output_features:
  - name: label
    type: category
