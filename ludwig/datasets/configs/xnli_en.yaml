version: 1.0
name: xnli_en
huggingface_dataset_id: xnli
huggingface_subsample: en
loader: hugging_face.HFLoader
description: |
  XNLI English: cross-lingual natural language inference, English split.
  Labels: entailment, neutral, contradiction.
columns:
  - name: premise
    type: text
  - name: hypothesis
    type: text
  - name: label
    type: category
output_features:
  - name: label
    type: category
