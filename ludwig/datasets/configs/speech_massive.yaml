version: 1.0
name: speech_massive
huggingface_dataset_id: FBK-MT/Speech-MASSIVE
huggingface_subsample: all
loader: hugging_face.HFLoader
description: |
  Speech-MASSIVE: multilingual audio intent classification. 23K train examples.
columns:
  - name: utt
    type: text
  - name: audio
    type: audio
  - name: intent_idx
    type: category
  - name: scenario
    type: category
output_features:
  - name: intent_idx
    type: category
