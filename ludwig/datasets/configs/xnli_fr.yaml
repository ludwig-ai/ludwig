version: 1.0
name: xnli_fr
huggingface_dataset_id: xnli
huggingface_subsample: fr
loader: hugging_face.HFLoader
description: |
  XNLI French: cross-lingual natural language inference, French split.
  Labels: entailment, neutral, contradiction.
columns:
  - name: premise
    type: text
  - name: hypothesis
    type: text
  - name: label
    type: category
output_features:
  - name: label
    type: category
