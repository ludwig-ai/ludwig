version: 1.0
name: invoice_data
huggingface_dataset_id: katanaml-org/invoices-donut-data-v1
loader: hugging_face.HFLoader
description: |
  Invoice document understanding: invoice image -> JSON ground truth (text generation).
  Exercises image input with text output for document AI tasks.
columns:
  - name: image
    type: image
  - name: ground_truth
    type: text
output_features:
  - name: ground_truth
    type: text
