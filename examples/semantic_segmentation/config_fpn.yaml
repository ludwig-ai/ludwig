input_features:
  - name: image_path
    type: image
    preprocessing:
      num_processes: 4
      height: 512
      width: 512
    encoder:
      type: efficientnet
      use_pretrained: true
      trainable: true

output_features:
  - name: mask_path
    type: image
    preprocessing:
      num_processes: 4
      height: 512
      width: 512
      num_classes: 32
    decoder:
      type: fpn
      num_channels: 256
      num_levels: 4
    loss:
      type: softmax_cross_entropy

combiner:
  type: concat
  num_fc_layers: 0

trainer:
  epochs: 100
  early_stop: 10
  batch_size: 8
  max_batch_size: 8
  learning_rate: 0.0001
