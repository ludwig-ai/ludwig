input_features:
  - name: fixed_acidity
    type: number
  - name: volatile_acidity
    type: number
  - name: citric_acid
    type: number
  - name: residual_sugar
    type: number
  - name: chlorides
    type: number
  - name: free_sulfur_dioxide
    type: number
  - name: total_sulfur_dioxide
    type: number
  - name: density
    type: number
  - name: pH
    type: number
  - name: sulphates
    type: number
  - name: alcohol
    type: number

output_features:
  - name: quality
    type: number

combiner:
  type: concat
  num_fc_layers: 2
  output_size: 64
  dropout: 0.1

# With relative_step: true Adafactor manages its own LR schedule.
# Do NOT set trainer.learning_rate or add a learning_rate_scheduler block here.
trainer:
  epochs: 30
  batch_size: 128
  optimizer:
    type: adafactor
    relative_step: true
    scale_parameter: true
    warmup_init: false
  early_stop: 10
