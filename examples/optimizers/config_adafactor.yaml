model_type: ecd
input_features:
  - name: fixed_acidity
    type: number
  - name: volatile_acidity
    type: number
  - name: citric_acid
    type: number
  - name: residual_sugar
    type: number
  - name: chlorides
    type: number
  - name: free_sulfur_dioxide
    type: number
  - name: total_sulfur_dioxide
    type: number
  - name: density
    type: number
  - name: pH
    type: number
  - name: sulphates
    type: number
  - name: alcohol
    type: number
output_features:
  - name: quality
    type: binary
trainer:
  epochs: 30
  optimizer:
    type: adafactor
    lr: 0.001
  # Adafactor uses internal second-moment approximation — no external LR scheduler needed
