input_features:
  - name: sensor_type
    type: category
  - name: reading_1
    type: number
  - name: reading_2
    type: number
  - name: reading_3
    type: number

output_features:
  - name: anomaly
    type: binary

combiner:
  type: concat
  num_fc_layers: 2
  output_size: 128
  dropout: 0.1

trainer:
  epochs: 30
  batch_size: 128
  learning_rate: 0.001
  early_stop: 10
